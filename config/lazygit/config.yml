customCommands:
  - key: "<c-c>"
    context: "files"
    description: "gitmoji でコミット"
    prompts:
      - type: "menu"
        title: "コミットタイプを選択"
        key: "Type"
        options:
          - name: "feat"
            description: "新機能の追加"
            value: "feat"
          - name: "fix"
            description: "バグ修正"
            value: "fix"
          - name: "docs"
            description: "ドキュメントの変更"
            value: "docs"
          - name: "style"
            description: "コードスタイル変更（動作に影響しない）"
            value: "style"
          - name: "refactor"
            description: "リファクタリング"
            value: "refactor"
          - name: "test"
            description: "テストの追加・修正"
            value: "test"
          - name: "chore"
            description: "ビルド・補助ツールの変更"
            value: "chore"
          - name: "perf"
            description: "パフォーマンス改善"
            value: "perf"
          - name: "ci"
            description: "CI 設定の変更"
            value: "ci"
          - name: "build"
            description: "ビルドシステムの変更"
            value: "build"
          - name: "revert"
            description: "コミットの取り消し"
            value: "revert"
      - type: "input"
        title: "スコープ（オプション、空のままでも可）"
        key: "Scope"
        initialValue: ""
      - type: "input"
        title: "コミットメッセージ"
        key: "Message"
        initialValue: ""
      - type: "menu"
        title: "絵文字を選択"
        key: "Emoji"
        options:
          - name: "(なし)"
            description: ""
            value: ""
          - name: ":sparkles:"
            description: "✨ 部分的な機能追加 (feat)"
            value: ":sparkles:"
          - name: ":tada:"
            description: "🎉 大きな機能追加 (feat)"
            value: ":tada:"
          - name: ":bug:"
            description: "🐛 バグ修正 (fix)"
            value: ":bug:"
          - name: ":memo:"
            description: "📝 ドキュメント (docs)"
            value: ":memo:"
          - name: ":lipstick:"
            description: "💄 UI/スタイル変更 (style)"
            value: ":lipstick:"
          - name: ":recycle:"
            description: "♻️ リファクタリング (refactor)"
            value: ":recycle:"
          - name: ":white_check_mark:"
            description: "✅ テスト追加・修正 (test)"
            value: ":white_check_mark:"
          - name: ":wrench:"
            description: "🔧 設定ファイル変更 (chore)"
            value: ":wrench:"
          - name: ":zap:"
            description: "⚡ パフォーマンス改善 (perf)"
            value: ":zap:"
          - name: ":construction_worker:"
            description: "👷 CI 設定変更 (ci)"
            value: ":construction_worker:"
          - name: ":package:"
            description: "📦 パッケージ更新 (build)"
            value: ":package:"
          - name: ":rewind:"
            description: "⏪ コミット取り消し (revert)"
            value: ":rewind:"
      - type: "confirm"
        title: "コミット確認"
        body: "メッセージ: '{{.Form.Type}}{{if .Form.Scope}}({{.Form.Scope}}){{end}}: {{.Form.Message}}{{if .Form.Emoji}} {{.Form.Emoji}}{{end}}'. よろしいですか？"
    command: "git commit -m '{{.Form.Type}}{{if .Form.Scope}}({{.Form.Scope}}){{end}}: {{.Form.Message}}{{if .Form.Emoji}} {{.Form.Emoji}}{{end}}'"
    loadingText: "コミット中..."
