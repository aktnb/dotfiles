# =============================================================================
# tmux.conf
# =============================================================================

# -----------------------------------------------------------------------------
# Prefix key
# -----------------------------------------------------------------------------

# デフォルトの C-b から C-a に変更
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# -----------------------------------------------------------------------------
# Terminal
# -----------------------------------------------------------------------------

# 256色 + True Color (Tc) を有効化
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# 拡張キーシーケンスを透過（Shift+Enter 等を内部アプリに正しく渡す）
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

# OSC 8 ハイパーリンクを端末に透過（Ghostty 等でリンクをクリック可能にする）
set -as terminal-features "*:hyperlinks"

# -----------------------------------------------------------------------------
# General
# -----------------------------------------------------------------------------

# ESCキーの遅延を削除（Neovim 等での誤動作を防ぐ）
set -sg escape-time 10

# ウィンドウ・ペインのインデックスを 1 始まりに
set -g base-index 1
set -g pane-base-index 1

# ウィンドウを閉じたとき番号を詰め直す
set -g renumber-windows on

# マウス操作を有効化
set -g mouse on

# フォーカスイベントを有効化（エディタのフォーカス検知に必要）
set -g focus-events on

# スクロールバックの上限行数
set -g history-limit 100000

# カレントディレクトリ名をウィンドウ名に自動設定
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# -----------------------------------------------------------------------------
# Key bindings
# -----------------------------------------------------------------------------

# 設定を再読み込み
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# ペインを閉じる（確認なし）
bind x kill-pane

# ウィンドウ分割（カレントディレクトリを引き継ぐ）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 新規ウィンドウ（カレントディレクトリを引き継ぐ）
bind c new-window -c "#{pane_current_path}"

# ペイン移動（Vim キーバインド）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ（-r で連打可能）
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# コピーモード（Vim キーバインド）
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# -----------------------------------------------------------------------------
# Appearance
# -----------------------------------------------------------------------------

# ウィンドウステータス（非アクティブ: グレー / アクティブ: ボールド）
set -g window-status-format "#[fg=colour245]#I:#W"
set -g window-status-current-format "#[bold]#I:#W"
setw -g window-status-style bg=default
setw -g window-status-current-style bg=default

# ペインボーダー（非アクティブ: 暗いグレー / アクティブ: ブルー）
set -g pane-border-style fg=#444444
set -g pane-active-border-style fg=#89b4fa

# ステータスバー
set -g status-style bg=default,fg=#cdd6f4
set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 80

# 左側: セッション名
set -g status-left "#[fg=green] #S "

# 右側: Gitブランチ名 / 日付 / 時刻
set -g status-right "#[fg=blue]#(cd '#{pane_current_path}' && git rev-parse --abbrev-ref HEAD 2>/dev/null) #[fg=yellow]%Y-%m-%d #[fg=cyan]%H:%M "
